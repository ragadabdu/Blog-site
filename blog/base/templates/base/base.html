{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
     rel="stylesheet">

    <title>My Blog</title>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar-custom {
            background-color: #1f2937;
        }

        .navbar-custom a {
            color: #f9fafb !important;
        }

        .hero {
            padding: 60px 0;
            text-align: center;
        }

        .post-card {
            border: none;
            border-radius: 16px;
            transition: 0.3s;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .post-title {
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <a class="navbar-brand fw-bold" href="/">Blog</a>

        <div class="ms-auto">
            <a href="/" class="px-3 text-decoration-none">Home</a>
            <a href="/" class="px-3 text-decoration-none">Explore</a>
            {% if not user.is_authenticated %}
                <a href="{% url 'base:login' %}" class="px-3 text-decoration-none">Sign in</a>
            {% endif %}
            <a href="{% url 'pages:post_form' %}" class="btn btn-light ms-2">Write</a>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <div class="container hero">
        <h1 class="display-5 fw-bold">Welcome to My Blog</h1>
        <p class="text-muted">Thoughts, stories, and ideas.</p>
    </div>
    
    {% block content %}
    {% endblock %}

    <!-- FOOTER -->
    <footer class="text-center py-4 mt-5 text-muted">
        <small>© 2026 My Blog</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
