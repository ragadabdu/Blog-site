{% extends 'base/base.html' %}

{% block content %}
<!-- POSTS -->
    <div class="container">
        <div class="row g-4">

            {% for post in posts %}
            <div class="col-md-4">
                <div class="card post-card p-3 h-100">
                    <div class="card-body">
                        <h5 class="post-title">{{ post.title }}</h5>
                        <p class="text-muted small">
                            {{ post.created_at|date:"M d, Y" }}
                        </p>
                        <p class="card-text">
                            {{ post.content|truncatewords:20 }}
                        </p>

                        <a href="{% url 'pages:post_detail' post.pk %}" class="btn btn-outline-dark btn-sm">
                            Read more
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
{% endblock %}
